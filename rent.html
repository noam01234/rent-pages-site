<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>דירה להשכרה</title>

  <!-- TSM CLEAN RENT PAGE v258 -->

  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --blue: #2563eb;
      --green: #047857;
      --green-bg: #ecfdf5;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .page {
      width: min(980px, calc(100% - 28px));
      margin: 18px auto 28px auto;
    }

    .hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .title-wrap {
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    h1 {
      margin: 8px 0 4px 0;
      font-size: 30px;
      line-height: 1.25;
      font-weight: 950;
      color: var(--text);
    }

    .address {
      font-size: 15px;
      color: var(--muted);
      font-weight: 800;
    }

    .gallery {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, 1fr);
      gap: 12px;
      align-items: start;
    }

    .main-photo {
      border-radius: 18px;
      overflow: hidden;
      background: #eef2f7;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.09);
    }

    .main-photo img {
      display: block;
      width: 100%;
      height: 430px;
      object-fit: cover;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      align-content: start;
    }

    .thumb {
      border: 0;
      padding: 0;
      margin: 0;
      height: 101px;
      border-radius: 13px;
      overflow: hidden;
      background: #e2e8f0;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(15, 23, 42, 0.09);
    }

    .thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb.active {
      outline: 3px solid var(--blue);
      outline-offset: 2px;
    }

    .photo-count {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      text-align: right;
    }

    .info-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .price-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: var(--green-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .price {
      color: var(--green);
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      direction: ltr;
      white-space: nowrap;
    }

    .price-label {
      color: var(--green);
      font-size: 15px;
      font-weight: 950;
      text-align: right;
    }

    .price-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: right;
      margin-top: 2px;
    }

    .details {
      font-size: 17px;
      color: #1e293b;
      white-space: pre-wrap;
    }

    .room-prices {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .room-prices h2 {
      margin: 0 0 10px 0;
      font-size: 19px;
      font-weight: 950;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .room-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
    }

    .room-name {
      font-size: 14px;
      color: var(--muted);
      font-weight: 850;
      margin-bottom: 4px;
    }

    .room-price {
      font-size: 20px;
      font-weight: 950;
      color: var(--text);
      direction: ltr;
      text-align: right;
    }

    .loading,
    .error,
    .empty {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: #b91c1c;
      background: #fff1f2;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      margin: 18px 0 0 0;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 18px, 980px);
        margin-top: 10px;
      }

      .hero,
      .info-card {
        border-radius: 18px;
        padding: 14px;
      }

      .top-row {
        display: block;
      }

      .badge {
        margin-bottom: 6px;
      }

      h1 {
        font-size: 23px;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .main-photo img {
        height: 270px;
      }

      .thumbs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .thumb {
        height: 108px;
        border-radius: 12px;
      }

      .price-box {
        align-items: flex-start;
      }

      .price {
        font-size: 27px;
      }

      .details {
        font-size: 16px;
      }

      .room-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page" id="app">
    <section class="loading">טוען את דף הדירה...</section>
  </main>

  <script>
    const SUPABASE_URL = "https://erhfqlcfwjqehffxetbv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyaGZxbGNmd2pxZWhmZnhldGJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTU4OTAsImV4cCI6MjA5NjE3MTg5MH0.Cq0tiB4NP17E5O_cB4dPNmFk_dl7FYxwQq75p4tlOZc";
    const TABLE_NAME = "rent_pages";

    const PHOTO_COLUMNS = [
      "photo_main_url",
      "photo_2_url",
      "photo_3_url",
      "photo_4_url",
      "photo_5_url",
      "photo_6_url",
      "photo_7_url",
      "photo_8_url"
    ];

    function getApartmentId() {
      return new URLSearchParams(window.location.search).get("id") || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function text(value, fallback = "") {
      const v = String(value ?? "").trim();
      return v || fallback;
    }

    function formatPrice(value) {
      const raw = String(value ?? "").trim();

      if (!raw) {
        return "";
      }

      const numeric = Number(raw.replace(/[^\d.]/g, ""));

      if (!Number.isFinite(numeric) || numeric <= 0) {
        return escapeHtml(raw);
      }

      return "₪" + numeric.toLocaleString("he-IL");
    }

    function collectPhotoUrls(row) {
      const urls = [];

      PHOTO_COLUMNS.forEach((column) => {
        const value = String(row?.[column] ?? "").trim();

        if (/^https?:\/\//i.test(value) && !urls.includes(value)) {
          urls.push(value);
        }
      });

      return urls;
    }

    function parseRoomPrices(value) {
      if (!value) {
        return [];
      }

      let data = value;

      if (typeof data === "string") {
        try {
          data = JSON.parse(data);
        } catch {
          return [];
        }
      }

      if (Array.isArray(data)) {
        return data
          .map((item) => ({
            name: text(item.name || item.room || item.label),
            price: text(item.price || item.amount || item.value)
          }))
          .filter((item) => item.name || item.price);
      }

      if (typeof data === "object") {
        return Object.keys(data)
          .map((key) => ({
            name: key,
            price: text(data[key])
          }))
          .filter((item) => item.name || item.price);
      }

      return [];
    }

    async function fetchRentPage(id) {
      const endpoint =
        SUPABASE_URL +
        "/rest/v1/" +
        TABLE_NAME +
        "?id=eq." +
        encodeURIComponent(id) +
        "&select=*&limit=1";

      const response = await fetch(endpoint, {
        method: "GET",
        cache: "no-store",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
          "Accept": "application/json"
        }
      });

      if (!response.ok) {
        const message = await response.text();
        throw new Error("Supabase fetch failed: HTTP " + response.status + " " + message);
      }

      const rows = await response.json();
      return Array.isArray(rows) && rows.length ? rows[0] : null;
    }

    function buildGallery(urls) {
      if (!urls.length) {
        return `
          <div class="empty">לא הועלו עדיין תמונות לדירה זו.</div>
        `;
      }

      const thumbs = urls.map((url, index) => `
        <button class="thumb ${index === 0 ? "active" : ""}" type="button" data-photo-index="${index}">
          <img src="${escapeHtml(url)}" alt="תמונה ${index + 1} של הדירה" loading="${index < 4 ? "eager" : "lazy"}">
        </button>
      `).join("");

      return `
        <div class="gallery">
          <div class="main-photo">
            <img id="mainPhoto" src="${escapeHtml(urls[0])}" alt="תמונה ראשית של הדירה" loading="eager">
          </div>

          <div class="thumbs">
            ${thumbs}
          </div>
        </div>

        <div class="photo-count">${urls.length} תמונות</div>
      `;
    }

    function buildRooms(roomPrices) {
      if (!roomPrices.length) {
        return "";
      }

      const cards = roomPrices.map((item) => `
        <div class="room-card">
          <div class="room-name">${escapeHtml(item.name || "חדר")}</div>
          <div class="room-price">${formatPrice(item.price)}</div>
        </div>
      `).join("");

      return `
        <section class="room-prices">
          <h2>מחירי חדרים</h2>
          <div class="room-grid">
            ${cards}
          </div>
        </section>
      `;
    }

    function renderPage(row) {
      const app = document.getElementById("app");
      const urls = collectPhotoUrls(row);
      const title = text(row.title, "דירה להשכרה");
      const address = text(row.address, "");
      const details = text(row.details || row.description, "");
      const price = formatPrice(row.price || row.starting_price);
      const isStartingPrice = Boolean(row.starting_price) || Boolean(row.room_prices_json);
      const roomPrices = parseRoomPrices(row.room_prices_json);

      document.title = title;

      app.innerHTML = `
        <section class="hero">
          <div class="top-row">
            <div class="title-wrap">
              <div class="badge">${row.is_available === false ? "לא זמין" : "זמין להשכרה"}</div>
              <h1>${escapeHtml(title)}</h1>
              ${address ? `<div class="address">${escapeHtml(address)}</div>` : ""}
            </div>
          </div>

          ${buildGallery(urls)}
        </section>

        <section class="info-card">
          ${price ? `
            <div class="price-box">
              <div>
                <div class="price-label">${isStartingPrice ? "מחיר החל מ-" : "מחיר"}</div>
                <div class="price-sub">לא כולל חשמל ומים</div>
              </div>
              <div class="price">${price}</div>
            </div>
          ` : ""}

          ${details ? `<div class="details">${escapeHtml(details)}</div>` : ""}

          ${buildRooms(roomPrices)}
        </section>

        <div class="footer-note">דף פרסום דירה</div>
      `;

      bindGallery(urls);
    }

    function bindGallery(urls) {
      const mainPhoto = document.getElementById("mainPhoto");
      const buttons = Array.from(document.querySelectorAll(".thumb"));

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.photoIndex || 0);
          const url = urls[index];

          if (!mainPhoto || !url) {
            return;
          }

          mainPhoto.src = url;

          buttons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });
    }

    function renderError(message) {
      document.getElementById("app").innerHTML = `
        <section class="error">
          ${escapeHtml(message)}
        </section>
      `;
    }

    async function main() {
      const id = getApartmentId();

      if (!id) {
        renderError("לא נבחר מזהה דירה.");
        return;
      }

      try {
        const row = await fetchRentPage(id);

        if (!row) {
          renderError("דף הדירה לא נמצא.");
          return;
        }

        renderPage(row);
      } catch (err) {
        console.error(err);
        renderError("אירעה שגיאה בטעינת דף הדירה.");
      }
    }

    main();
  </script>
</body>
</html>
